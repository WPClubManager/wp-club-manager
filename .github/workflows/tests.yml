name: Unit Tests

on:
  pull_request:
    paths:
      - "**.php"
      - "tests/wpunit/**"
      - "composer.json"
      - "composer.lock"
      - ".github/workflows/tests.yml"
  push:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wpunit:
    name: WPUnit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: wp_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, pdo_mysql
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Install WordPress
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          mkdir -p /tmp/wordpress
          php wp-cli.phar core download --path=/tmp/wordpress --quiet
          php wp-cli.phar config create --path=/tmp/wordpress --dbname=wp_tests --dbuser=root --dbpass=password --dbhost=127.0.0.1 --quiet
          php wp-cli.phar core install --path=/tmp/wordpress --url=http://localhost --title="WPCM Tests" --admin_user=admin --admin_password=password --admin_email=admin@example.com --skip-email --quiet

      - name: Link plugin into WordPress
        run: |
          mkdir -p /tmp/wordpress/wp-content/plugins
          ln -s ${{ github.workspace }} /tmp/wordpress/wp-content/plugins/wp-club-manager
          php wp-cli.phar option add wpcm_sport soccer --path=/tmp/wordpress --quiet
          php wp-cli.phar option add wpcm_mode club --path=/tmp/wordpress --quiet
          php wp-cli.phar option add wpclubmanager_installed 1 --path=/tmp/wordpress --quiet
          php wp-cli.phar option add wpclubmanager_version 2.2.17 --path=/tmp/wordpress --quiet
          php wp-cli.phar theme install twentytwentythree --activate --path=/tmp/wordpress --quiet
          php wp-cli.phar plugin activate wp-club-manager --path=/tmp/wordpress --quiet

      - name: Configure test environment
        run: |
          printf 'params:\n    - .env.local\n' > tests/codeception.yml
          touch tests/.env
          printf 'WP_ROOT_FOLDER=/tmp/wordpress\n' > tests/.env.local
          printf 'TEST_DB_NAME=wp_tests\n' >> tests/.env.local
          printf 'TEST_DB_HOST=127.0.0.1\n' >> tests/.env.local
          printf 'TEST_DB_USER=root\n' >> tests/.env.local
          printf 'TEST_DB_PASSWORD=password\n' >> tests/.env.local
          printf 'TEST_TABLE_PREFIX=wp_\n' >> tests/.env.local
          printf 'TEST_SITE_WP_DOMAIN=localhost\n' >> tests/.env.local
          printf 'TEST_SITE_ADMIN_EMAIL=admin@example.com\n' >> tests/.env.local
          printf 'TEST_SITE_WP_URL=http://localhost\n' >> tests/.env.local

      - name: Build Codeception support classes
        run: cd tests && php ../vendor/bin/codecept build --quiet

      - name: Run WPUnit tests
        run: cd tests && php ../vendor/bin/codecept run wpunit --no-colors
